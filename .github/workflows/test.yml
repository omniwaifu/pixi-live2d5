name: CI

on:
    push:
    pull_request:
    workflow_dispatch:
    workflow_call:

concurrency:
    group: ci-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    validate:
        name: Lint, Test, and Pack
        runs-on: ubuntu-24.04
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.5

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "bun"

            - name: Restore Cubism core cache
              uses: actions/cache@v5
              id: cache-core
              with:
                  path: |
                      core/live2dcubismcore.js
                      core/live2dcubismcore.d.ts
                  key: cubism-core-${{ runner.os }}-${{ hashFiles('scripts/setup.js') }}

            - run: bun install --frozen-lockfile

            - name: Download Cubism 5 core
              if: steps.cache-core.outputs.cache-hit != 'true'
              run: bun run setup

            - name: Ensure Xvfb is available
              run: |
                  if ! command -v xvfb-run >/dev/null 2>&1; then
                    sudo apt-get update
                    sudo apt-get install -y xvfb
                  fi

            - run: bun run lint
            - run: xvfb-run -a bun run test
            - run: bun pm pack --dry-run
