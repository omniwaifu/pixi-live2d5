name: Publish Package to npmjs

on:
    release:
        types: [published]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    publish:
        runs-on: ubuntu-24.04
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.5

            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  registry-url: "https://registry.npmjs.org"
                  cache: "bun"

            - name: Restore Cubism core cache
              uses: actions/cache@v5
              id: cache-core
              with:
                  path: |
                      core/live2dcubismcore.js
                      core/live2dcubismcore.d.ts
                  key: cubism-core-${{ runner.os }}-${{ hashFiles('scripts/setup.js') }}

            - run: bun install --frozen-lockfile

            - name: Download Cubism 5 core
              if: steps.cache-core.outputs.cache-hit != 'true'
              run: bun run setup

            - name: Ensure Xvfb is available
              run: |
                  if ! command -v xvfb-run >/dev/null 2>&1; then
                    sudo apt-get update
                    sudo apt-get install -y xvfb
                  fi

            - run: bun run lint
            - run: xvfb-run -a bun run test
            - run: bun pm pack --dry-run

            # parse the package version to determine the npm tag to use (most likely "beta").
            # Example:
            # v0.5.0-beta -> beta
            # 0.5.0 -> latest
            - name: Determine npm tag
              id: npm-tag
              run: |
                  TAG=$(node -p "const version = require('./package.json').version.replace(/^v/, ''); const prerelease = version.split('-')[1]; prerelease ? prerelease.split('.')[0] : 'latest';")
                  echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

            - name: Publish to NPM
              run: npm publish --tag "${{ steps.npm-tag.outputs.tag }}"
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
